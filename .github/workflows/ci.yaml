name: Registry push

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  pull_request:
    branches:
      - 'main'

concurrency:
  group: registry-push
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm run lint

  docker:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/import-ai/omnibox-web
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: |
            linux/amd64
            linux/arm64

  webhook:
    runs-on: ubuntu-latest
    needs: [ docker ]
    steps:
      - name: TEST push webhook
        if: github.event_name == 'push'
        env:
          WEBHOOK_URL: ${{ secrets.DEV_WEBHOOK_URL }}
          API_KEY: ${{ secrets.DEV_WEBHOOK_API_KEY }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REF: ${{ github.ref_name }}
        run: |
          curl "${WEBHOOK_URL}/test?module=web&ref=${REF}&commit=${GITHUB_SHA}&tag=sha-${GITHUB_SHA::7}&run_url=${RUN_URL}" -H "Authorization: Bearer ${API_KEY}"

      - name: TEST pull request webhook
        if: github.event_name == 'pull_request'
        env:
          WEBHOOK_URL: ${{ secrets.DEV_WEBHOOK_URL }}
          API_KEY: ${{ secrets.DEV_WEBHOOK_API_KEY }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REF: ${{ github.head_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          REF_LINK_TEXT="pr-${PR_NUMBER}"
          REF_LINK_URL="${{ github.server_url }}/${{ github.repository }}/pull/${PR_NUMBER}"
          curl "${WEBHOOK_URL}/test?module=web&ref=${REF}&commit=${HEAD_SHA}&tag=sha-${GITHUB_SHA::7}&run_url=${RUN_URL}&ref_link_text=${REF_LINK_TEXT}&ref_link_url=${REF_LINK_URL}" -H "Authorization: Bearer ${API_KEY}"
